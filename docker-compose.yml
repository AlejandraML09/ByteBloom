services:
  db-bytebloom:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bytebloom
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - pip-cache:/root/.cache/pip
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-bytebloom:5432/bytebloom
    command: sh -c "pip install -r requirements.txt -q && alembic upgrade head"
    depends_on:
      db-bytebloom:
        condition: service_healthy
    restart: "no"

  backend:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - pip-cache:/root/.cache/pip
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-bytebloom:5432/bytebloom
    command: sh -c "pip install -r requirements.txt -q && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      db-bytebloom:
        condition: service_healthy

volumes:
  pgdata:
  pip-cache: